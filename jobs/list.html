<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>구인구직 | 대한집합건물관리협회</title>
  <meta name="description" content="집합건물 관리인·관리소장·시설관리 전문 구인구직 게시판입니다." />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase 데이터베이스 통신을 위한 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --navy: #0B2A5B; --teal: #2BA8A0; --white: #FFFFFF;
      --bg: #F8FAFC; --trans: .22s ease;
    }
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #F8FAFC; color: #333; line-height: 1.7; }
    
    a, [data-href] { cursor: pointer; }
    
    .menu-item { color: #333333; font-weight: 700; transition: color var(--trans); }
    .menu-item:hover, .menu-item.active { color: var(--teal); } 

    /* PC GNB 드롭다운 강제 활성화 CSS */
    .gnb-dropdown-wrap { position: relative; display: flex; align-items: center; height: 100%; padding: 10px 0; }
    .gnb-dropdown-menu { display: none; position: absolute; top: 100%; left: -20px; width: 140px; padding-top: 10px; z-index: 999; }
    .gnb-dropdown-wrap:hover .gnb-dropdown-menu { display: block !important; }
    .dropdown-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; }
    .dropdown-box div { display: block; padding: 12px 16px; font-size: 14px; font-weight: 500; color: #475569; border-bottom: 1px solid #f8fafc; text-align: left; cursor: pointer; transition: background 0.2s; }
    .dropdown-box div:hover { background: #f1f5f9; color: #2BA8A0; }
  </style>
  
  <script>
    // Supabase 창고 연결 세팅
    const SUPABASE_URL = 'https://ehrahnnowwjkgycvlbzk.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_84t7lsP69H4iXBjMrmezhw_T73VLXhv'; // 기존 제공해주신 키
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function handleNavigation(element) {
      const url = element.getAttribute('data-href');
      const target = element.getAttribute('data-target');
      if (url && url !== '#') {
        if (target === '_blank') { window.open(url, '_blank'); } 
        else { window.location.href = url; }
      }
    }
    
    // 모바일 메뉴 제어 시 스크롤바 흔들림 방지용
    function getScrollbarWidth() {
      return window.innerWidth - document.documentElement.clientWidth;
    }

    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      if (menu.classList.contains('hidden')) {
        menu.classList.remove('hidden');
        if (document.body.scrollHeight > window.innerHeight) {
          document.body.style.paddingRight = getScrollbarWidth() + 'px';
        }
        document.body.style.overflow = 'hidden';
      } else {
        menu.classList.add('hidden');
        document.body.style.overflow = '';
        document.body.style.paddingRight = ''; 
      }
    }

    // 구인구직 데이터 불러오기 함수
    async function loadJobs() {
      const { data, error } = await supabaseClient
        .from('jobs')
        .select('*')
        .order('id', { ascending: false });

      if (error) {
        console.error('데이터 불러오기 에러:', error);
        return;
      }

      const pcTableBody = document.getElementById('jobTableBody');
      const mobileContainer = document.getElementById('mobileJobCards');

      pcTableBody.innerHTML = '<tr id="job-no-result" style="display:none;"><td colspan="6" class="text-center py-10 text-gray-500 font-medium">검색 결과가 없습니다.</td></tr>';
      mobileContainer.innerHTML = '<p id="mobile-no-result" style="display:none;text-align:center;padding:32px;color:#94a3b8;">검색 결과가 없습니다.</p>';

      data.forEach((job) => {
        const startDate = job.start_date ? job.start_date.replace(/-/g, '.') : '';
        const endDate = job.end_date ? job.end_date.replace(/-/g, '.') : '';
        const dateString = (startDate && endDate) ? `${startDate}~${endDate}` : '상시 모집';

        let badgeClass = 'bg-gray-100 text-gray-700';
        if (job.category === '오피스텔') badgeClass = 'bg-purple-100 text-purple-700';
        else if (job.category === '빌딩') badgeClass = 'bg-blue-100 text-blue-700';
        else if (job.category === '상가') badgeClass = 'bg-green-100 text-green-700';

        const shortAddress = job.address ? job.address.split(' ').slice(0, 2).join(' ') : job.region;

        const tr = document.createElement('tr');
        tr.className = 'border-b border-gray-100 hover:bg-gray-50 transition-colors cursor-pointer';
        tr.dataset.region = job.region;
        tr.dataset.type = job.type;
        tr.dataset.employment = job.employment;
        tr.onclick = () => window.location.href = `job-detail.html?id=${job.id}`;
        
        tr.innerHTML = `
          <td class="py-4 px-4 text-center text-gray-500">${job.id}</td>
          <td class="py-4 px-4 text-center"><span class="${badgeClass} text-xs font-bold px-2 py-1 rounded">${job.category || '기타'}</span></td>
          <td class="py-4 px-4 font-bold text-gray-900">${job.title}</td>
          <td class="py-4 px-4 text-gray-600">${shortAddress}</td>
          <td class="py-4 px-4 text-gray-600">${job.employment} / ${job.experience}</td>
          <td class="py-4 px-4 text-gray-400 text-xs">${dateString}</td>
        `;
        pcTableBody.insertBefore(tr, document.getElementById('job-no-result'));

        const div = document.createElement('div');
        div.className = 'bg-white border border-gray-200 rounded-xl p-4 shadow-sm cursor-pointer transition-shadow hover:shadow-md mobile-job-card mb-3';
        div.dataset.region = job.region;
        div.dataset.type = job.type;
        div.dataset.employment = job.employment;
        div.onclick = () => window.location.href = `job-detail.html?id=${job.id}`;

        div.innerHTML = `
          <div class="flex justify-between items-center mb-2">
            <span class="${badgeClass} text-[11px] font-bold px-2.5 py-1 rounded">${job.category || '기타'}</span>
            <span class="text-xs text-gray-400">${dateString}</span>
          </div>
          <p class="text-[15px] font-bold text-gray-900 mb-1.5 break-keep">${job.title}</p>
          <p class="text-[13px] text-gray-500">${shortAddress} · ${job.employment} / ${job.experience}</p>
        `;
        mobileContainer.insertBefore(div, document.getElementById('mobile-no-result'));
      });

      if(typeof applyFilters === 'function') {
        applyFilters();
      }
    }

    window.addEventListener('DOMContentLoaded', loadJobs);
  </script>
</head>

  <!-- 구인구직 검색 필터 스크립트 -->
  <script>
    function applyFilters() {
      var input = document.getElementById('jobSearch');
      var selects = document.querySelectorAll('.board-search select');
      
      var kw = input.value.toLowerCase();
      var reg = selects[0].value, typ = selects[1].value, emp = selects[2].value;
      
      // PC 테이블 필터링
      var pcRows = document.querySelectorAll('#jobTableBody tr:not(#job-no-result)');
      var pcVisibleCount = 0;
      pcRows.forEach(row => {
        var show = (kw === '' || row.innerText.toLowerCase().includes(kw)) && 
                     (reg === '전체지역' || row.dataset.region === reg) &&
                     (typ === '전체직종' || row.dataset.type === typ) &&
                     (emp === '전체근무형태' || row.dataset.employment === emp);
        row.style.display = show ? '' : 'none';
        if(show) pcVisibleCount++;
      });
      var pcNoResult = document.getElementById('job-no-result');
      if(pcNoResult) pcNoResult.style.display = pcVisibleCount === 0 ? '' : 'none';

      // 모바일 카드 필터링
      var mobCards = document.querySelectorAll('#mobileJobCards .mobile-job-card');
      var mobVisibleCount = 0;
      mobCards.forEach(card => {
        var show = (kw === '' || card.innerText.toLowerCase().includes(kw)) && 
                     (reg === '전체지역' || card.dataset.region === reg) &&
                     (typ === '전체직종' || card.dataset.type === typ) &&
                     (emp === '전체근무형태' || card.dataset.employment === emp);
        card.style.display = show ? 'block' : 'none';
        if(show) mobVisibleCount++;
      });
      var mobileNoResult = document.getElementById('mobile-no-result');
      if(mobileNoResult) mobileNoResult.style.display = mobVisibleCount === 0 ? 'block' : 'none';
    }
    
    // 이벤트 리스너 부착
    document.getElementById('jobSearch').addEventListener('input', applyFilters);
    document.querySelectorAll('.board-search select').forEach(sel => sel.addEventListener('change', applyFilters));
  </script>
