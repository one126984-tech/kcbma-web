  <script>
    const SUPABASE_URL = 'https://ehrahnnowwjkgycvlbzk.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_84t7lsP69H4iXBjMrmezhw_T73VLXhv';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function handleNavigation(element) {
      const url = element.getAttribute('data-href');
      const target = element.getAttribute('data-target');
      if (url && url !== '#') {
        if (target === '_blank') { window.open(url, '_blank'); } 
        else { window.location.href = url; }
      }
    }
    
    function openCustomModal(id) {
      document.querySelectorAll('.modal-backdrop').forEach(m => m.classList.remove('is-open'));
      document.getElementById('modal-' + id).classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }
    function closeCustomModal(id) {
      document.getElementById('modal-' + id).classList.remove('is-open');
      document.body.style.overflow = '';
    }
    function switchCustomModal(closeId, openId) {
      closeCustomModal(closeId);
      setTimeout(() => openCustomModal(openId), 100);
    }

    function handleFormSubmit(event, modalId, message) {
      event.preventDefault(); 
      alert(message);
      if(modalId) closeCustomModal(modalId);
    }

    // ★ 추가됨: '직접 입력' 선택할 때 텍스트창을 열고 닫는 함수
    function toggleDirectExperience(selectElement) {
      const directInput = document.getElementById('job-experience-direct');
      if (selectElement.value === '직접입력') {
        directInput.classList.remove('hidden');
        directInput.focus();
      } else {
        directInput.classList.add('hidden');
        directInput.value = '';
      }
    }

    // 구인 공고 등록 처리 함수
    async function handleJobSubmit(e) {
      e.preventDefault(); 
      
      const form = e.target;

      const category = form.category.value.trim();
      const type = form.type.value.trim();
      const title = form.title.value.trim();
      const employment = form.employment.value.trim();
      
      // ★ 수정됨: '직접 입력'을 썼다면 직접 쓴 글자를 가져오도록 판별하는 로직
      let experience = form.experience.value.trim();
      if (experience === '직접입력') {
        experience = form.experience_direct.value.trim();
      }

      const region = form.region.value.trim();
      const salary = form.salary.value.trim();
      const address = form.address.value.trim();
      const startDate = form.start_date.value;
      const endDate = form.end_date.value;
      const description = form.description.value.trim();

      if (!category) { alert('건물 구분을 선택해 주세요.'); form.category.focus(); return; }
      if (!type) { alert('모집 직종을 선택해 주세요.'); form.type.focus(); return; }
      if (!title) { alert('공고 제목을 입력해 주세요.'); form.title.focus(); return; }
      if (!employment) { alert('고용 형태를 선택해 주세요.'); form.employment.focus(); return; }
      
      // ★ 경력 필수 체크 유효성 검사 수정
      if (form.experience.value === '') { alert('경력 여부를 선택해 주세요.'); form.experience.focus(); return; }
      if (form.experience.value === '직접입력' && !experience) { alert('경력 사항을 직접 입력해 주세요.'); form.experience_direct.focus(); return; }

      if (!region) { alert('근무 지역을 선택해 주세요.'); form.region.focus(); return; }
      if (!salary) { alert('급여 조건을 입력해 주세요.'); form.salary.focus(); return; }
      if (!address) { alert('상세 근무지 주소를 입력해 주세요.'); form.address.focus(); return; }
      if (!startDate) { alert('모집 시작일을 선택해 주세요.'); form.start_date.focus(); return; }
      if (!endDate) { alert('모집 마감일을 선택해 주세요.'); form.end_date.focus(); return; }
      if (!description) { alert('상세 내용을 입력해 주세요.'); form.description.focus(); return; }

      try {
        const { data, error } = await supabaseClient
          .from('jobs')
          .insert([
            {
              category: category,
              type: type,
              title: title,
              employment: employment,
              experience: experience, // 최종 가공된 경력 텍스트가 DB로 안전하게 들어갑니다.
              region: region,
              salary: salary,
              address: address,
              start_date: startDate,
              end_date: endDate,
              description: description,
              status: '모집중',
              view_count: 0
            }
          ]);

        if (error) throw error;

        alert('공고가 성공적으로 등록되었습니다!');
        window.location.href = 'list.html';
      } catch (error) {
        alert('공고 등록 중 오류가 발생했습니다: ' + error.message);
        console.error('DB 저장 에러:', error);
      }
    }

    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      if (menu.classList.contains('hidden')) {
        menu.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
      } else {
        menu.classList.add('hidden');
        document.body.style.overflow = '';
      }
    }
  </script>
</head>

            <input type="date" id="job-start-date" name="start_date" class="form-input border border-gray-300 p-3 rounded-lg text-[15px] w-full" />
          </div>
          <div class="flex flex-col">
            <label class="text-[14px] font-bold text-gray-800 mb-2" for="job-end-date">모집 마감일 <span class="text-red-500 ml-1">*</span></label>
            <input type="date" id="job-end-date" name="end_date" class="form-input border border-gray-300 p-3 rounded-lg text-[15px] w-full" />
          </div>
        </div>

        <div class="flex flex-col mb-2">
          <label class="text-[14px] font-bold text-gray-800 mb-2" for="job-description">상세 내용 <span class="text-red-500 ml-1">*</span></label>
          <textarea id="job-description" name="description" class="form-textarea border border-gray-300 p-4 rounded-lg text-[15px] w-full resize-y min-h-[240px]" placeholder="- 주요 업무:&#10;- 자격 요건:&#10;- 우대 사항:&#10;- 복리 후생:&#10;- 지원 방법:"></textarea>
        </div>

        <div class="flex flex-col sm:flex-row justify-center gap-3 mt-10">
          <button type="button" class="w-full sm:w-auto bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3.5 px-10 rounded-xl transition-colors text-[15px]" onclick="window.history.back();">취소</button>
          <button type="submit" class="w-full sm:w-auto bg-[#0B2A5B] hover:bg-[#153b80] text-white font-bold py-3.5 px-10 rounded-xl transition-colors shadow-sm text-[15px]">공고 등록하기</button>
        </div>
        
      </form>
    </div>
  </main>
