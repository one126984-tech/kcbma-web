    }

    .menu-item { color: #333333; font-weight: 700; transition: color var(--trans); }
    .menu-item:hover, .menu-item.active { color: var(--teal); } 

    /* PC GNB 드롭다운 강제 활성화 CSS */
    .gnb-dropdown-wrap { position: relative; display: flex; align-items: center; height: 100%; padding: 10px 0; }
    .gnb-dropdown-menu { display: none; position: absolute; top: 100%; left: -20px; width: 140px; padding-top: 10px; z-index: 999; }
    .gnb-dropdown-wrap:hover .gnb-dropdown-menu { display: block !important; }
    .dropdown-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; }
    .dropdown-box div { display: block; padding: 12px 16px; font-size: 14px; font-weight: 500; color: #475569; border-bottom: 1px solid #f8fafc; text-align: left; cursor: pointer; transition: background 0.2s; }
    .dropdown-box div:hover { background: #f1f5f9; color: #2BA8A0; }

    /* 폼 요소 스타일 */
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(11, 42, 91, 0.1); }
  </style>
  
  <script>
    // Supabase 설정
    const SUPABASE_URL = 'https://ehrahnnowwjkgycvlbzk.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_84t7lsP69H4iXBjMrmezhw_T73VLXhv';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 공통 내비게이션 및 메뉴 스크립트
    function handleNavigation(element) {
      const url = element.getAttribute('data-href');
      const target = element.getAttribute('data-target');
      if (url && url !== '#') {
        if (target === '_blank') { window.open(url, '_blank'); } 
        else { window.location.href = url; }
      }
    }

    function getScrollbarWidth() {
      return window.innerWidth - document.documentElement.clientWidth;
    }

    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      if (menu.classList.contains('hidden')) {
        menu.classList.remove('hidden');
        if (document.body.scrollHeight > window.innerHeight) {
          document.body.style.paddingRight = getScrollbarWidth() + 'px';
        }
        document.body.style.overflow = 'hidden';
      } else {
        menu.classList.add('hidden');
        document.body.style.overflow = '';
        document.body.style.paddingRight = ''; 
      }
    }

    // 경력 직접 입력 토글
    function toggleDirectExperience(selectElement) {
      const directInput = document.getElementById('job-experience-direct');
      if (selectElement.value === '직접입력') {
        directInput.classList.remove('hidden');
        directInput.required = true;
        directInput.focus();
      } else {
        directInput.classList.add('hidden');
        directInput.required = false;
        directInput.value = '';
      }
    }

    // 구인 공고 등록 처리
    async function handleJobSubmit(e) {
      e.preventDefault(); 
      const form = e.target;

      let experienceValue = form.experience.value;
      if (experienceValue === '직접입력') {
        experienceValue = form.experience_direct.value.trim();
      }

      const jobData = {
        category: form.category.value,
        type: form.type.value,
        title: form.title.value.trim(),
        employment: form.employment.value,
        experience: experienceValue,
        region: form.region.value,
        salary: form.salary.value.trim(),
        address: form.address.value.trim(),
        start_date: form.start_date.value,
        end_date: form.end_date.value,
        description: form.description.value.trim(),
        status: '모집중',
        view_count: 0
      };

      try {
        const { error } = await supabaseClient.from('jobs').insert([jobData]);
        if (error) throw error;
        alert('공고가 성공적으로 등록되었습니다!');
        window.location.href = 'list.html';
      } catch (error) {
        alert('공고 등록 실패: ' + error.message);
      }
    }
  </script>

            <select name="region" class="border border-gray-300 p-3 rounded-lg w-full bg-white" required>

              <option value="인천">인천</option>

          <input type="text" name="title" class="form-input border border-gray-300 p-3 rounded-lg w-full" placeholder="예: [강남구 빌딩] 성실한 시설관리 주임 모십니다." required />

            <select name="employment" class="border border-gray-300 p-3 rounded-lg w-full bg-white" required>

          </div>
