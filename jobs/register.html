<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>공고 등록 | 대한집합건물관리협회</title>
  <meta name="description" content="집합건물 관리인·관리소장·시설관리 구인구직 공고 등록 페이지입니다." />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  
  <style>
    :root { --navy: #0B2A5B; --teal: #2BA8A0; --white: #FFFFFF; }
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #F8FAFC; color: #333; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(11, 42, 91, 0.1); }
  </style>
  
  <script>
    const SUPABASE_URL = 'https://ehrahnnowwjkgycvlbzk.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_84t7lsP69H4iXBjMrmezhw_T73VLXhv';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 경력 직접 입력 토글
    function toggleDirectExperience(selectElement) {
      const directInput = document.getElementById('job-experience-direct');
      if (selectElement.value === '직접입력') {
        directInput.classList.remove('hidden');
        directInput.required = true;
        directInput.focus();
      } else {
        directInput.classList.add('hidden');
        directInput.required = false;
        directInput.value = '';
      }
    }

    // 구인 공고 등록 처리
    async function handleJobSubmit(e) {
      e.preventDefault(); 
      const form = e.target;

      let experienceValue = form.experience.value;
      if (experienceValue === '직접입력') {
        experienceValue = form.experience_direct.value.trim();
      }

      const jobData = {
        category: form.category.value,
        type: form.type.value,
        title: form.title.value.trim(),
        employment: form.employment.value,
        experience: experienceValue,
        region: form.region.value,
        salary: form.salary.value.trim(),
        address: form.address.value.trim(),
        start_date: form.start_date.value,
        end_date: form.end_date.value,
        description: form.description.value.trim(),
        status: '모집중',
        view_count: 0
      };

      try {
        const { error } = await supabaseClient.from('jobs').insert([jobData]);
        if (error) throw error;
        alert('공고가 성공적으로 등록되었습니다!');
        window.location.href = 'list.html';
      } catch (error) {
        alert('공고 등록 실패: ' + error.message);
      }
    }
  </script>
</head>
<body class="flex flex-col min-h-screen">

  <main class="flex-1 py-8 md:py-12 max-w-4xl mx-auto px-4 sm:px-6 w-full">
    <div class="bg-white border border-gray-200 rounded-2xl p-6 md:p-10 shadow-sm">
      <h1 class="text-2xl font-black text-[#0B2A5B] mb-8">구인구직 공고 등록</h1>
      
      <form onsubmit="handleJobSubmit(event)">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
          <div class="flex flex-col">
            <label class="text-[14px] font-bold text-gray-800 mb-2">건물 구분 <span class="text-red-500">*</span></label>
            <select name="category" class="border border-gray-300 p-3 rounded-lg w-full bg-white" required>
              <option value="">선택해주세요</option>
              <option value="빌딩">빌딩</option>
              <option value="오피스텔">오피스텔</option>
              <option value="상가">상가</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div class="flex flex-col">
            <label class="text-[14px] font-bold text-gray-800 mb-2">모집 직종 <span class="text-red-500">*</span></label>
            <select name="type" class="border border-gray-300 p-3 rounded-lg w-full bg-white" required>
              <option value="">선택해주세요</option>
              <option value="관리소장">관리소장</option>
              <option value="시설관리인">시설관리인</option>
              <option value="야간관리원">야간관리원(경비)</option>
              <option value="미화원">미화원</option>
            </select>
          </div>
        </div>

        <div class="mb-6">
          <label class="text-[14px] font-bold text-gray-800 mb-2">공고 제목 <span class="text-red-500">*</span></label>
          <input type="text" name="title" class="form-input border border-gray-300 p-3 rounded-lg w-full" placeholder="예: [강남구 빌딩] 성실한 시설관리 주임 모십니다." required />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
          <div class="flex flex-col">
            <label class="text-[14px] font-bold text-gray-800 mb-2">고용 형태 <span class="text-red-500">*</span></label>
            <select name="employment" class="border border-gray-300 p-3 rounded-lg w-full bg-white" required>
              <option value="정규직">정규직</option>
              <option value="계약직">계약직</option>
            </select>
          </div>
          <div class="flex flex-col">
            <label class="text-[14px] font-bold text-gray-800 mb-2">경력 여부 <span class="text-red-500">*</span></label>
            <select name="experience" class="border border-gray-300 p-3 rounded-lg w-full bg-white" onchange="toggleDirectExperience(this)" required>
              <option value="">선택해주세요</option>
              <option value="신입">신입</option>
              <option value="경력무관">경력무관</option>
              <option value="직접입력">직접 입력</option>
            </select>
            <input type="text" name="experience_direct" id="job-experience-direct" class="form-input border border-gray-300 p-3 rounded-lg w-full mt-2 hidden" placeholder="경력을 직접 입력하세요" />
          </div>
        </div>

        <div class="mb-6">
          <label class="text-[14px] font-bold text-gray-800 mb-2">상세 근무지 주소 <span class="text-red-500">*</span></label>
          <input type="text" name="address" class="form-input border border-gray-300 p-3 rounded-lg w-full" placeholder="예: 서울 강남구 테헤란로 OO빌딩" required />
        </div>

        <div class="flex flex-col mb-6">
          <label class="text-[14px] font-bold text-gray-800 mb-2">상세 내용 <span class="text-red-500">*</span></label>
          <textarea name="description" class="form-textarea border border-gray-300 p-4 rounded-lg w-full min-h-[200px]" required></textarea>
        </div>

        <div class="flex justify-center gap-3 mt-10">
          <button type="button" class="px-10 py-3 bg-gray-100 rounded-xl font-bold" onclick="history.back()">취소</button>
          <button type="submit" class="px-10 py-3 bg-[#0B2A5B] text-white rounded-xl font-bold">공고 등록하기</button>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
