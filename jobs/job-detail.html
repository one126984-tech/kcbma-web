    :root {

    body { font-family: 'Noto Sans KR', sans-serif; background-color: #F8FAFC; color: #333; line-height: 1.7; }

    /* 지원방법 하이라이트 애니메이션 */
    .apply-info-highlight { animation: highlightPulse 2s ease-out; }
    @keyframes highlightPulse {
      0% { box-shadow: 0 0 0 0 rgba(43,168,160,0.7); }
      70% { box-shadow: 0 0 0 10px rgba(43,168,160,0); }
      100% { box-shadow: 0 0 0 0 rgba(43,168,160,0); }

  </style>

  <script>
    // 공통 내비게이션 함수
    function handleNavigation(element) {
      const url = element.getAttribute('data-href');
      const target = element.getAttribute('data-target');
      if (url && url !== '#') {
        if (target === '_blank') { window.open(url, '_blank'); } 
        else { window.location.href = url; }
      }
    }
    
    // 모바일 햄버거 메뉴 및 스크롤바 제어
    function getScrollbarWidth() {
      return window.innerWidth - document.documentElement.clientWidth;
    }

    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      if (menu.classList.contains('hidden')) { 
        menu.classList.remove('hidden'); 
        if (document.body.scrollHeight > window.innerHeight) {
          document.body.style.paddingRight = getScrollbarWidth() + 'px';
        }
        document.body.style.overflow = 'hidden'; 
      } 
      else { 
        menu.classList.add('hidden'); 
        document.body.style.overflow = ''; 
        document.body.style.paddingRight = ''; 
      }
    }
    
    // ※ 주의: 기존에 있던 openCustomModal 등 팝업 관련 함수는 모두 제거되었습니다. (auth.js가 처리)
  </script>

  <!-- Supabase 상세 정보 동적 연동 스크립트 -->
  <script>
    (function() {
      const URL_PATH = 'https://ehrahnnowwjkgycvlbzk.supabase.co';
      const ANON_KEY_PATH = 'sb_publishable_84t7lsP69H4iXBjMrmezhw_T73VLXhv';
      const mySupabase = window.supabase.createClient(URL_PATH, ANON_KEY_PATH, { auth: { persistSession: false } });

      let rawEmail = '';
      let rawPhone = '';
      let isUserLoggedIn = false;

      async function checkUserAuth() {
        try {
          const { data: { user } } = await mySupabase.auth.getUser();
          if (user) isUserLoggedIn = true;
        } catch (e) {
          isUserLoggedIn = false;
        }
      }

      async function loadJobDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id');
        if (!jobId) return;

        await checkUserAuth();

        try {
          const { data: job, error } = await mySupabase.from('jobs').select('*').eq('id', jobId).single();
          if (error) throw error;

          if (job) {
            console.log('✅ 호출 성공 데이터:', job);

            document.getElementById('job-title').textContent = job.title || '제목 없음';
            document.getElementById('job-created').textContent = `등록: ${job.created_at ? job.created_at.split('T')[0] : '-'}`;
            
            const deadlineVal = job.deadline || '채용시까지';
            document.getElementById('job-deadline').textContent = `마감: ${deadlineVal}`;

            if (job.deadline && job.deadline !== '채용시까지') {
              const today = new Date();
              const end = new Date(job.deadline);
              document.getElementById('badge-status').textContent = end >= today ? "진행중" : "마감";
            } else {
              document.getElementById('badge-status').textContent = "진행중";
            }
            
            document.getElementById('badge-category').textContent = job.category || '구인';
            document.getElementById('badge-type').textContent = job.type || job.job_type || '상용직';

            document.getElementById('job-region').textContent = job.region || job.location || '-';
            document.getElementById('job-type').textContent = job.type || job.job_type || '-';
            document.getElementById('job-salary').textContent = job.salary || job.pay || '-';
            document.getElementById('job-worktime').textContent = job.work_time || job.worktime || '협의';
            document.getElementById('job-housing').textContent = job.housing || '미제공';
            document.getElementById('job-complex').textContent = job.complex || job.building || job.category || '-';
            
            document.getElementById('job-content').innerText = job.content || job.description || '상세 내용이 없습니다.';

            rawEmail = job.email || '미기재';
            rawPhone = job.phone || job.tel || '미기재';
            document.getElementById('apply-deadline-text').textContent = deadlineVal;

            renderContactInformation();

            try {
              const currentViews = (job.views || 0) + 1;
              document.getElementById('job-views').textContent = `조회: ${currentViews}`;
              await mySupabase.from('jobs').update({ views: currentViews }).eq('id', jobId);
            } catch (e) {}
          }
        } catch (error) {
          console.error(error);
        }
      }

      function renderContactInformation() {
        const emailEl = document.getElementById('apply-email-text');
        const phoneEl = document.getElementById('apply-phone-text');
        const actionBtn = document.getElementById('btn-show-contact');

        if (isUserLoggedIn) {
          emailEl.innerHTML = `<a href="mailto:${rawEmail}" class="text-blue-600 hover:underline">${rawEmail}</a>`;
          phoneEl.innerHTML = `<a href="tel:${rawPhone}" class="text-blue-600 hover:underline">${rawPhone}</a>`;
          
          actionBtn.textContent = "지원 정보 확인 완료";
          actionBtn.className = "bg-gray-400 text-white font-bold py-3.5 px-8 rounded-full shadow-sm w-full sm:w-auto text-[15px] cursor-not-allowed";
          actionBtn.onclick = null;
        } else {
          emailEl.textContent = "회원공개 🔒";
          emailEl.className = "text-gray-400 font-medium cursor-pointer";
          emailEl.onclick = triggerMembershipGate;

          phoneEl.textContent = "회원공개 🔒";
          phoneEl.className = "text-gray-400 font-medium cursor-pointer";
          phoneEl.onclick = triggerMembershipGate;

          actionBtn.textContent = "연락처 보기 →";
          actionBtn.onclick = triggerMembershipGate;
        }
      }

      function triggerMembershipGate() {
        alert("회원만 볼 수 있습니다.");
        // auth.js 파일에 정의된 함수 호출
        if (typeof openCustomModal === 'function') {
          openCustomModal('signup');
        }
      }

      document.addEventListener('DOMContentLoaded', loadJobDetail);
    })();
  </script>
