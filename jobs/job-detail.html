<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>구인 상세 | 대한집합건물관리협회</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --navy: #0B2A5B; --teal: #2BA8A0; --white: #FFFFFF;
      --bg: #F8FAFC; --trans: .22s ease;
    }
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #F8FAFC; color: #333; line-height: 1.7; }
    a, [data-href] { cursor: pointer; }
    .menu-item { color: #333333; transition: color 0.2s ease-in-out; }
    .menu-item:hover { color: #2BA8A0; } 
    .menu-item.active { color: #000000; font-weight: 900; }
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; }
    .modal-backdrop.is-open { display: flex !important; }
    .modal-dialog { background: white; padding: 35px 30px; border-radius: 12px; width: 90%; max-width: 420px; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    .modal-close { position: absolute; top: 15px; right: 15px; cursor: pointer; background: none; border: none; padding: 5px; color: #94A3B8; }
    .modal-brand { text-align: center; margin-bottom: 20px; }
    .modal-title { font-size: 1.5rem; font-weight: 800; color: #0e2b61; margin-bottom: 5px; }
    .modal-input { width: 100%; padding: 12px 14px; border: 1.5px solid #E2E8F0; border-radius: 10px; margin-bottom: 12px; outline: none; }
    .modal-input:focus { border-color: #0e2b61; }
    .btn-primary-full { width: 100%; padding: 14px; background: var(--navy); color: #fff; font-weight: 700; border-radius: 10px; cursor: pointer; transition: background 0.2s; }
    .btn-primary-full:hover { background: #153b80; }
    .modal-switch { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #64748b; }
    .modal-switch a { color: #0e2b61; font-weight: bold; cursor: pointer; }
    
    .apply-info-highlight { animation: highlightPulse 2s ease-out; }
    @keyframes highlightPulse {
      0% { box-shadow: 0 0 0 0 rgba(43,168,160,0.7); }
      70% { box-shadow: 0 0 0 10px rgba(43,168,160,0); }
      100% { box-shadow: 0 0 0 0 rgba(43,168,160,0); }
    }
  </style>

  <script>
    function handleNavigation(element) {
      const url = element.getAttribute('data-href');
      const target = element.getAttribute('data-target');
      if (url && url !== '#') {
        if (target === '_blank') { window.open(url, '_blank'); } 
        else { window.location.href = url; }
      }
    }
    function openCustomModal(id) {
      document.querySelectorAll('.modal-backdrop').forEach(m => m.classList.remove('is-open'));
      const modal = document.getElementById('modal-' + id);
      if (modal) { modal.classList.add('is-open'); document.body.style.overflow = 'hidden'; }
    }
    function closeCustomModal(id) {
      const modal = document.getElementById('modal-' + id);
      if (modal) { modal.classList.remove('is-open'); document.body.style.overflow = ''; }
    }
    function switchCustomModal(closeId, openId) {
      closeCustomModal(closeId);
      setTimeout(() => openCustomModal(openId), 100); 
    }
    function handleFormSubmit(event, modalId, message) {
      event.preventDefault(); 
      alert(message);
      closeCustomModal(modalId);
    }
    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      if (menu.classList.contains('hidden')) { menu.classList.remove('hidden'); document.body.style.overflow = 'hidden'; } 
      else { menu.classList.add('hidden'); document.body.style.overflow = ''; }
    }
  </script>
</head>
<body class="flex flex-col min-h-screen">

  <!-- 통합 표준 헤더 -->
  <div class="sticky top-0 z-[900] w-full flex flex-col bg-white border-b border-gray-300 shadow-sm">
    <div class="w-full bg-[#0a1931] py-2.5">
      <div class="max-w-7xl mx-auto px-2 md:px-8 flex flex-wrap justify-center sm:justify-end items-center gap-1.5 md:gap-3 text-white text-[11px] sm:text-[13px] font-bold">
        <div data-href="https://cafe.naver.com/kcbma114" data-target="_blank" onclick="handleNavigation(this)" class="bg-[#03c75a] hover:bg-[#02a64b] px-2.5 py-1.5 md:px-4 md:py-1.5 rounded cursor-pointer">네이버카페</div>
        <div onclick="openCustomModal('login')" class="bg-[#1f3b73] hover:bg-[#152a55] px-2.5 py-1.5 md:px-4 md:py-1.5 rounded cursor-pointer">로그인</div>
        <div onclick="openCustomModal('signup')" class="bg-[#1f3b73] hover:bg-[#152a55] px-2.5 py-1.5 md:px-4 md:py-1.5 rounded cursor-pointer">회원가입</div>
        <div class="flex items-center cursor-pointer bg-[#0a1931] px-1 md:ml-2">
          <span onclick="openCustomModal('find-id')" class="hover:text-gray-300 p-1.5">아이디찾기</span>
          <span class="text-gray-400 font-normal">|</span>
          <span onclick="openCustomModal('find-pw')" class="hover:text-gray-300 p-1.5">비밀번호찾기</span>
        </div>
      </div>
    </div>
    <header class="flex justify-between items-center px-4 md:px-8 py-4 max-w-7xl mx-auto w-full">
      <div data-href="../index.html" onclick="handleNavigation(this)" class="flex items-center h-[40px] md:h-[48px] cursor-pointer">
        <img src="../방패로고.jpg" alt="방패로고" class="h-full w-auto">
        <img src="../로고_글자.png" alt="글자로고" class="h-[36px] md:h-[44px] w-auto ml-2 mt-1">
      </div>
    </header>
  </div>

  <main class="flex-1 py-8 md:py-12 max-w-4xl mx-auto px-4 sm:px-6 w-full">
    <article class="bg-white border border-gray-200 rounded-2xl p-6 md:p-10 shadow-sm mb-8">
      
      <!-- 상단 배지 영역 -->
      <div class="flex gap-2 mb-4 flex-wrap items-center">
        <span id="badge-status" class="bg-red-100 text-red-700 text-xs font-bold px-3 py-1 rounded-full">진행중</span>
        <span id="badge-category" class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full">구인</span>
        <span id="badge-type" class="bg-purple-100 text-purple-700 text-xs font-bold px-3 py-1 rounded-full">-</span>
      </div>
      
      <h2 id="job-title" class="text-xl md:text-2xl font-black text-[#0B2A5B] leading-snug mb-4 break-keep">데이터를 불러오는 중...</h2>
      
      <div class="flex gap-4 items-center flex-wrap text-sm text-gray-500 mb-6 pb-4 border-b border-gray-100">
        <span id="job-created">등록: -</span>
        <span id="job-deadline">마감: -</span>
        <span id="job-views">조회: -</span>
      </div>

      <!-- 정보 그리드 (담당단지 -> 근무처 교체 완료 및 id 매핑 재수정) -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-0 border border-gray-200 rounded-xl overflow-hidden mb-8 bg-white">
        <div class="flex flex-col p-4 border-b sm:border-r sm:border-b border-gray-200">
          <span class="text-xs text-gray-500 font-bold mb-1">근무지</span>
          <span id="job-region" class="text-sm font-bold text-[#0B2A5B]">-</span>
        </div>
        <div class="flex flex-col p-4 border-b border-gray-200">
          <span class="text-xs text-gray-500 font-bold mb-1">고용형태</span>
          <span id="job-type" class="text-sm font-bold text-[#0B2A5B]">-</span>
        </div>
        <div class="flex flex-col p-4 border-b sm:border-r border-gray-200">
          <span class="text-xs text-gray-500 font-bold mb-1">급여</span>
          <span id="job-salary" class="text-sm font-bold text-[#0B2A5B]">-</span>
        </div>
        <div class="flex flex-col p-4 border-b border-gray-200">
          <span class="text-xs text-gray-500 font-bold mb-1">근무시간</span>
          <span id="job-worktime" class="text-sm font-bold text-[#0B2A5B]">-</span>
        </div>
        <div class="flex flex-col p-4 border-b sm:border-b-0 sm:border-r border-gray-200">
          <span class="text-xs text-gray-500 font-bold mb-1">숙소</span>
          <span id="job-housing" class="text-sm font-bold text-[#0B2A5B]">-</span>
        </div>
        <div class="flex flex-col p-4">
          <!-- [요청사항 반영] 담당단지에서 근무처로 텍스트 문구 교체 -->
          <span class="text-xs text-gray-500 font-bold mb-1">근무처</span>
          <span id="job-complex" class="text-sm font-bold text-[#0B2A5B]">-</span>
        </div>
      </div>

      <!-- 모집 내용 본문 (동적 연동 완료) -->
      <div class="mb-8">
        <h3 class="text-base font-black text-[#0B2A5B] mb-3 pb-2 border-b-2 border-[#2BA8A0] inline-block">모집 내용</h3>
        <div id="job-content" class="text-[15px] text-gray-700 leading-relaxed space-y-4 break-keep whitespace-pre-line">-</div>
      </div>

      <!-- 지원 방법 박스 -->
      <div class="mb-6">
        <h3 class="text-base font-black text-[#0B2A5B] mb-3 pb-2 border-b-2 border-[#2BA8A0] inline-block">지원 방법</h3>
        <div id="apply-section-box" class="bg-gray-50 border border-gray-200 rounded-xl p-5 md:p-6 transition-shadow">
          <p class="text-sm font-black text-[#0B2A5B] mb-3">아래 방법으로 지원서를 제출해 주세요</p>
          <div class="space-y-2 text-[14px] text-gray-600">
            <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-3">
              <span class="font-bold text-[#0B2A5B] w-14">이메일</span>
              <span id="apply-email-text" class="break-all font-semibold">-</span>
            </div>
            <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-3">
              <span class="font-bold text-[#0B2A5B] w-14">전화</span>
              <span id="apply-phone-text" class="font-semibold">-</span>
            </div>
            <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-3">
              <!-- [요청사항 반영] 마감일 동적 구동 영역 -->
              <span class="font-bold text-[#0B2A5B] w-14">마감일</span>
              <span id="apply-deadline-text">-</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 제어 버튼 영역 -->
      <div class="mt-8 flex flex-wrap gap-3 items-center">
        <button id="btn-show-contact" class="bg-[#2BA8A0] hover:bg-[#208882] text-white font-bold py-3.5 px-8 rounded-full transition-colors shadow-sm w-full sm:w-auto text-[15px]">
          연락처 보기 →
        </button>
        <button data-href="list.html" onclick="handleNavigation(this)" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-600 font-bold py-3.5 px-8 rounded-full transition-colors w-full sm:w-auto text-[15px]">목록으로</button>
      </div>

    </article>
  </main>

  <!-- 회원가입 모달 -->
  <div class="modal-backdrop" id="modal-signup" role="dialog" aria-modal="true">
    <div class="modal-dialog overflow-y-auto max-h-[90vh]">
      <button class="modal-close" onclick="closeCustomModal('signup')">✕</button>
      <div class="modal-brand">
        <img src="../대한집합건물관리협회-removebg-preview.png" alt="KCBMA" class="h-[40px] w-auto mx-auto mb-4 object-contain" onerror="this.src='../방패로고.jpg'" />
        <p class="modal-title">회원가입</p>
        <p class="text-xs text-gray-500 text-center mt-1">통합 회원이 되어 실무 권익 인프라를 누리세요</p>
      </div>
      <form class="mt-4" onsubmit="handleFormSubmit(event, 'signup', '회원가입 신청이 완료되었습니다.');">
        <input class="modal-input" type="text" placeholder="성함" required />
        <input class="modal-input" type="text" placeholder="아이디 희망문자" required />
        <input class="modal-input" type="email" placeholder="이메일 주소" required />
        <input class="modal-input" type="password" placeholder="비밀번호 서식 (8자 이상)" required />
        <button type="submit" class="btn-primary-full mt-2">가입 신청 완료</button>
      </form>
    </div>
  </div>

  <!-- Supabase 통합 엔진 -->
  <script>
    (function() {
      const URL_PATH = 'https://ehrahnnowwjkgycvlbzk.supabase.co';
      const ANON_KEY_PATH = 'sb_publishable_84t7lsP69H4iXBjMrmezhw_T73VLXhv';
      const mySupabase = window.supabase.createClient(URL_PATH, ANON_KEY_PATH, { auth: { persistSession: false } });

      let rawEmail = '';
      let rawPhone = '';
      let isUserLoggedIn = false;

      async function checkUserAuth() {
        try {
          const { data: { user } } = await mySupabase.auth.getUser();
          if (user) isUserLoggedIn = true;
        } catch (e) {
          isUserLoggedIn = false;
        }
      }

      async function loadJobDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id');
        if (!jobId) return;

        await checkUserAuth();

        try {
          const { data: job, error } = await mySupabase.from('jobs').select('*').eq('id', jobId).single();
          if (error) throw error;

          if (job) {
            console.log('✅ 호출 성공 데이터:', job);

            // 기본 타이틀 정보 동적 반영
            document.getElementById('job-title').textContent = job.title || '제목 없음';
            document.getElementById('job-created').textContent = `등록: ${job.created_at ? job.created_at.split('T')[0] : '-'}`;
            
            // [수정] 상단 마감일 변수 연동 정상화
            const deadlineVal = job.deadline || '채용시까지';
            document.getElementById('job-deadline').textContent = `마감: ${deadlineVal}`;

            // 상단 배지 상태 스위칭
            if (job.deadline && job.deadline !== '채용시까지') {
              const today = new Date();
              const end = new Date(job.deadline);
              document.getElementById('badge-status').textContent = end >= today ? "진행중" : "마감";
            } else {
              document.getElementById('badge-status').textContent = "진행중";
            }
            document.getElementById('badge-category').textContent = job.category || '구인';
            document.getElementById('badge-type').textContent = job.type || job.job_type || '상용직';

            // 중앙 그리드 연동 정상화 및 변수 누락 방지 매칭
            document.getElementById('job-region').textContent = job.region || job.location || '-';
            document.getElementById('job-type').textContent = job.type || job.job_type || '-';
            document.getElementById('job-salary').textContent = job.salary || job.pay || '-';
            
            // [수정] 근무시간(work_time) 필드 매칭 완료
            document.getElementById('job-worktime').textContent = job.work_time || job.worktime || '협의';
            document.getElementById('job-housing').textContent = job.housing || '미제공';
            
            // [수정] 근무처(category 또는 complex) 정상 출력 매칭
            document.getElementById('job-complex').textContent = job.complex || job.building || job.category || '-';
            
            // [수정] 모집 내용 본문 정상 연동
            document.getElementById('job-content').innerText = job.content || job.description || '상세 내용이 없습니다.';

            // 연락처 캐싱 및 지원방법 하단 마감일 반영
            rawEmail = job.email || '미기재';
            rawPhone = job.phone || job.tel || '미기재';
            document.getElementById('apply-deadline-text').textContent = deadlineVal;

            renderContactInformation();

            try {
              const currentViews = (job.views || 0) + 1;
              document.getElementById('job-views').textContent = `조회: ${currentViews}`;
              await mySupabase.from('jobs').update({ views: currentViews }).eq('id', jobId);
            } catch (e) {}
          }
        } catch (error) {
          console.error(error);
        }
      }

      function renderContactInformation() {
        const emailEl = document.getElementById('apply-email-text');
        const phoneEl = document.getElementById('apply-phone-text');
        const actionBtn = document.getElementById('btn-show-contact');

        if (isUserLoggedIn) {
          emailEl.innerHTML = `<a href="mailto:${rawEmail}" class="text-blue-600 hover:underline">${rawEmail}</a>`;
          phoneEl.innerHTML = `<a href="tel:${rawPhone}" class="text-blue-600 hover:underline">${rawPhone}</a>`;
          
          actionBtn.textContent = "지원 정보 확인 완료";
          actionBtn.className = "bg-gray-400 text-white font-bold py-3.5 px-8 rounded-full shadow-sm w-full sm:w-auto text-[15px] cursor-not-allowed";
          actionBtn.onclick = null;
        } else {
          emailEl.textContent = "회원공개 🔒";
          emailEl.className = "text-gray-400 font-medium cursor-pointer";
          emailEl.onclick = triggerMembershipGate;

          phoneEl.textContent = "회원공개 🔒";
          phoneEl.className = "text-gray-400 font-medium cursor-pointer";
          phoneEl.onclick = triggerMembershipGate;

          actionBtn.textContent = "연락처 보기 →";
          actionBtn.onclick = triggerMembershipGate;
        }
      }

      function triggerMembershipGate() {
        alert("회원만 볼 수 있습니다.");
        openCustomModal('signup');
      }

      document.addEventListener('DOMContentLoaded', loadJobDetail);
    })();
  </script>
</body>
</html>
