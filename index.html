<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>대한집합건물관리협회 — 관리의 든든한 울타리</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f7fa; }
    a, button { cursor: pointer; outline: none; }
    
    .hero-section-new { padding: 120px 20px; text-align: center; background-color: #0e2b61; color: #fff; }
    .hero-badge-new { border: 1px solid #2BA8A0; padding: 6px 24px; border-radius: 30px; color: #2BA8A0; font-size: 0.95rem; font-weight: 700; display: inline-block; margin-bottom: 25px; }
    .hero-title-main-new { font-size: 4.8rem; font-weight: 900; margin: 0 0 25px 0; letter-spacing: -0.03em; word-break: keep-all; }
    .hero-desc-new { font-size: 1.25rem; font-weight: 400; opacity: 0.85; margin: 0 0 50px 0; word-break: keep-all; }

    /* 모달창(팝업) 스타일 - display:flex !important로 강제 활성화 */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; }
    .modal-backdrop.is-open { display: flex !important; }
    .modal-dialog { background: white; padding: 35px 30px; border-radius: 12px; width: 90%; max-width: 420px; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    .modal-close { position: absolute; top: 15px; right: 15px; cursor: pointer; background: none; border: none; font-size: 1.2rem; }
    .modal-brand { text-align: center; margin-bottom: 20px; }
    .modal-title { font-size: 1.5rem; font-weight: 800; color: #0e2b61; margin-bottom: 5px; }
    .modal-form { display: flex; flex-direction: column; gap: 15px; }
    .modal-field { display: flex; flex-direction: column; text-align: left; }
    .modal-label { font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #333; }
    .modal-input { border: 1px solid #cbd5e1; padding: 12px; border-radius: 6px; font-size: 0.95rem; }
    .btn-primary-full { background: #0e2b61; color: white; padding: 14px; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; border: none; margin-top: 10px; }
    .modal-switch { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #64748b; }
    .modal-switch a { color: #0e2b61; font-weight: bold; cursor: pointer; text-decoration: none; }
    
    .modal-message { padding: 10px 14px; border-radius: 6px; font-size: 0.85rem; margin-top: 10px; display: none; }
    .modal-message.success { display: block; background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .modal-message.error { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .modal-message.info { display: block; background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
  </style>

  <script>
    // 팝업 열기 함수
    window.openCustomModal = function(id) {
      console.log('버튼 클릭됨! 여는 창:', id);
      // 모든 팝업 먼저 닫기
      document.querySelectorAll('.modal-backdrop').forEach(m => m.classList.remove('is-open'));
      // 선택한 팝업 열기
      const modal = document.getElementById('modal-' + id);
      if (modal) {
        modal.classList.add('is-open');
        document.body.style.overflow = 'hidden'; 
      }
    };

    // 팝업 닫기 함수
    window.closeCustomModal = function(id) {
      const modal = document.getElementById('modal-' + id);
      if (modal) {
        modal.classList.remove('is-open');
        document.body.style.overflow = ''; 
      }
    };

    // 팝업 전환 (예: 로그인 -> 회원가입)
    window.switchCustomModal = function(closeId, openId) {
      window.closeCustomModal(closeId);
      setTimeout(() => window.openCustomModal(openId), 150); 
    };

    // 메시지 띄우기 함수
    window.showMessage = function(elId, text, type) {
      const el = document.getElementById(elId);
      el.textContent = text;
      el.className = 'modal-message ' + type;
    };
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 배경 클릭 시 팝업 닫기 이벤트 등록
      document.querySelectorAll('.modal-backdrop').forEach(backdrop => {
        backdrop.addEventListener('click', e => {
          if (e.target === backdrop) window.closeCustomModal(backdrop.id.replace('modal-', ''));
        });
      });

      // Supabase 키 설정
      const SUPABASE_URL = 'https://ehrahnnowwjkgycvlbzk.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVocmFobm5vd3dqa2d5Y3ZsYnprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMzQ1NjQsImV4cCI6MjA5NzYxMDU2NH0.A0MfXNI4W7sPUM4UwSn7_kY5n2gEhp3N8ubH7uBZZwk';
      
      if (!window.supabase) {
        console.warn('Supabase를 불러오지 못했습니다. 네트워크를 확인하세요.');
        return;
      }
      
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // 인증 상태 확인
      supabase.auth.getSession().then(({ data: { session } }) => updateUI(session));
      supabase.auth.onAuthStateChange((event, session) => updateUI(session));

      function updateUI(session) {
        const authBtns = document.getElementById('auth-buttons');
        const userSec = document.getElementById('user-section');
        if (session && session.user) {
          const name = session.user.user_metadata?.name || session.user.email.split('@')[0];
          authBtns.style.display = 'none';
          userSec.style.display = 'flex';
          userSec.innerHTML = `<span class="text-white text-sm font-bold mr-3">👤 ${name}님</span><button class="bg-red-600 text-white text-xs font-bold px-3 py-1.5 rounded" onclick="supabase.auth.signOut()">로그아웃</button>`;
        } else {
          authBtns.style.display = 'flex';
          userSec.style.display = 'none';
        }
      }

      // 1. 회원가입 폼 제출
      document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const email = document.getElementById('signup-email').value.trim();
        const pw = document.getElementById('signup-pw').value;
        const name = document.getElementById('signup-name').value.trim();
        const btn = document.getElementById('signup-btn');

        btn.disabled = true; btn.textContent = '처리 중...';
        const { error } = await supabase.auth.signUp({ email, password: pw, options: { data: { name } } });
        
        if (error) {
          window.showMessage('signup-message', '오류: ' + error.message, 'error');
        } else {
          window.showMessage('signup-message', '가입 성공! 창이 닫히면 바로 로그인해주세요.', 'success');
          e.target.reset();
          setTimeout(() => window.switchCustomModal('signup', 'login'), 2000);
        }
        btn.disabled = false; btn.textContent = '가입하기';
      });

      // 2. 로그인 폼 제출
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-id').value.trim();
        const password = document.getElementById('login-pw').value;
        const btn = document.getElementById('login-btn');

        btn.disabled = true; btn.textContent = '로그인 중...';
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        
        if (error) {
          window.showMessage('login-message', '이메일 또는 비밀번호를 확인해주세요.', 'error');
        } else {
          window.showMessage('login-message', '로그인 성공!', 'success');
          e.target.reset();
          setTimeout(() => window.closeCustomModal('login'), 1000);
        }
        btn.disabled = false; btn.textContent = '로그인';
      });

      // 3. 아이디 찾기 폼 제출
      document.getElementById('find-id-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('find-id-email').value.trim();
        window.showMessage('find-id-message', `본 사이트는 이메일(${email})이 아이디입니다. 바로 로그인해주세요.`, 'info');
      });

      // 4. 비밀번호 찾기 폼 제출
      document.getElementById('find-pw-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('find-pw-email').value.trim();
        const btn = document.getElementById('find-pw-btn');

        btn.disabled = true; btn.textContent = '발송 중...';
        const { error } = await supabase.auth.resetPasswordForEmail(email);
        if (error) {
          window.showMessage('find-pw-message', '오류: ' + error.message, 'error');
        } else {
          window.showMessage('find-pw-message', '비밀번호 재설정 메일을 발송했습니다.', 'success');
        }
        btn.disabled = false; btn.textContent = '재설정 링크 받기';
      });
    });
  </script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

  <div class="w-full bg-[#0a1931] py-2 relative z-50">
    <div class="max-w-7xl mx-auto px-3 md:px-8 flex justify-center sm:justify-end items-center gap-1 md:gap-3 flex-nowrap">
      
      <div id="auth-buttons" class="flex items-center gap-2">
        <button type="button" onclick="window.openCustomModal('login')" class="bg-[#1f3b73] hover:bg-[#152a55] text-white text-[13px] font-bold px-4 py-1.5 rounded transition-colors whitespace-nowrap border-none cursor-pointer">로그인</button>
        <button type="button" onclick="window.openCustomModal('signup')" class="bg-[#1f3b73] hover:bg-[#152a55] text-white text-[13px] font-bold px-4 py-1.5 rounded transition-colors whitespace-nowrap border-none cursor-pointer">회원가입</button>
        <div class="text-white text-[13px] font-bold flex items-center ml-2 whitespace-nowrap">
          <button type="button" onclick="window.openCustomModal('find-id')" class="bg-transparent border-none text-white hover:text-gray-300 cursor-pointer p-0 m-0">아이디찾기</button>
          <span class="mx-2 text-gray-400 font-normal">|</span>
          <button type="button" onclick="window.openCustomModal('find-pw')" class="bg-transparent border-none text-white hover:text-gray-300 cursor-pointer p-0 m-0">비밀번호찾기</button>
        </div>
      </div>

      <div id="user-section" style="display:none;"></div>
    </div>
  </div>

  <header class="flex justify-center items-center px-4 py-6 max-w-7xl mx-auto w-full">
    <div class="flex items-center space-x-3">
      <img src="assets/img/방패로고-removebg-preview.png" class="h-[48px] w-auto" alt="KCBMA 마크" onerror="this.style.display='none'">
      <h1 class="font-bold text-2xl text-[#0a1931] m-0">대한집합건물관리협회</h1>
    </div>
  </header>

  <section class="hero-section-new flex-1">
    <div class="hero-badge-new">TEST 모드 작동 중</div>
    <h1 class="hero-title-main-new">로그인 기능 테스트 페이지</h1>
    <p class="hero-desc-new">오른쪽 위 버튼들을 눌러 로그인, 회원가입 팝업이 뜨는지 확인해 보세요.</p>
  </section>


  <div class="modal-backdrop" id="modal-login">
    <div class="modal-dialog">
      <button class="modal-close" onclick="window.closeCustomModal('login')">✖</button>
      <div class="modal-brand"><p class="modal-title">로그인</p></div>
      <form class="modal-form" id="login-form">
        <div class="modal-field">
          <label class="modal-label">이메일</label>
          <input class="modal-input" type="email" id="login-id" placeholder="이메일 입력" required />
        </div>
        <div class="modal-field">
          <label class="modal-label">비밀번호</label>
          <input class="modal-input" type="password" id="login-pw" placeholder="비밀번호" required />
        </div>
        <div id="login-message" class="modal-message"></div>
        <button type="submit" id="login-btn" class="btn-primary-full">로그인</button>
      </form>
      <p class="modal-switch">계정이 없으신가요? <a onclick="window.switchCustomModal('login', 'signup')">회원가입</a></p>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-signup">
    <div class="modal-dialog">
      <button class="modal-close" onclick="window.closeCustomModal('signup')">✖</button>
      <div class="modal-brand"><p class="modal-title">회원가입</p></div>
      <form class="modal-form" id="signup-form">
        <div class="modal-field">
          <label class="modal-label">이름</label>
          <input class="modal-input" type="text" id="signup-name" placeholder="홍길동" required />
        </div>
        <div class="modal-field">
          <label class="modal-label">이메일 (아이디)</label>
          <input class="modal-input" type="email" id="signup-email" placeholder="test@email.com" required />
        </div>
        <div class="modal-field">
          <label class="modal-label">비밀번호</label>
          <input class="modal-input" type="password" id="signup-pw" placeholder="8자 이상" required />
        </div>
        <div id="signup-message" class="modal-message"></div>
        <button type="submit" id="signup-btn" class="btn-primary-full">가입하기</button>
      </form>
      <p class="modal-switch">이미 가입하셨나요? <a onclick="window.switchCustomModal('signup', 'login')">로그인</a></p>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-find-id">
    <div class="modal-dialog">
      <button class="modal-close" onclick="window.closeCustomModal('find-id')">✖</button>
      <div class="modal-brand"><p class="modal-title">아이디 찾기</p></div>
      <form class="modal-form" id="find-id-form">
        <div class="modal-field">
          <input class="modal-input" type="email" id="find-id-email" placeholder="가입 시 입력한 이메일" required />
        </div>
        <div id="find-id-message" class="modal-message"></div>
        <button type="submit" class="btn-primary-full">아이디 확인</button>
      </form>
      <p class="modal-switch"><a onclick="window.switchCustomModal('find-id', 'login')">로그인 창으로</a></p>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-find-pw">
    <div class="modal-dialog">
      <button class="modal-close" onclick="window.closeCustomModal('find-pw')">✖</button>
      <div class="modal-brand"><p class="modal-title">비밀번호 찾기</p></div>
      <form class="modal-form" id="find-pw-form">
        <div class="modal-field">
          <input class="modal-input" type="email" id="find-pw-email" placeholder="가입한 이메일 주소" required />
        </div>
        <div id="find-pw-message" class="modal-message"></div>
        <button type="submit" id="find-pw-btn" class="btn-primary-full">재설정 링크 받기</button>
      </form>
      <p class="modal-switch"><a onclick="window.switchCustomModal('find-pw', 'login')">로그인 창으로</a></p>
    </div>
  </div>

</body>
</html>
